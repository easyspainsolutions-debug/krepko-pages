<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <circle cx="16" cy="16" r="15.5" fill="#171C28"/>
  <!-- Thin gold ring (Variant 2 — Circle frame) -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#C4952A" stroke-width="0.7" opacity="0.85"/>
  <!-- Letter K — geometric, equal weight strokes, rounded caps -->
  <g fill="none" stroke="#C4952A" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vertical bar -->
    <line x1="11.5" y1="9" x2="11.5" y2="23"/>
    <!-- Upper diagonal -->
    <line x1="11.5" y1="16" x2="20.5" y2="9"/>
    <!-- Lower diagonal -->
    <line x1="11.5" y1="16" x2="20.5" y2="23"/>
  </g>
</svg>
